<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Solid Cyan Squircle — renders perfectly in all browsers at 16px -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="#00C9D4" />

  <!-- Loop A (Split: Left-to-Right Swoosh) — solid white -->
  <path
    d="M 32,35 C 32,24 48,18 60,28 C 72,38 72,54 50,50 C 28,46 24,62 40,72 C 52,82 72,76 72,65"
    stroke="#FFFFFF"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Loop B (Sync: Right-to-Left Swoosh) — solid white, slightly transparent -->
  <path
    d="M 72,65 C 72,76 52,82 40,72 C 28,62 32,46 50,50 C 72,54 76,38 62,28 C 48,18 32,24 32,35"
    stroke="#FFFFFF"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Arrowhead for Loop A -->
  <path d="M 74,57 L 72,65 L 64,63" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Arrowhead for Loop B -->
  <path d="M 30,43 L 32,35 L 40,37" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Central node -->
  <circle cx="50" cy="50" r="5" fill="#FFFFFF" opacity="0.95" />

</svg>
