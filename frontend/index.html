<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    
    <!-- Primary SEO Metadata -->
    <title>SplitSync | Track, Split & Settle Group Expenses</title>
    <meta name="description" content="SplitSync is the ultimate serverless expense-splitting tool. Split bills equally, unequally, by percentages, or shares, record settlements, and chat in real-time." />
    <meta name="keywords" content="splitsync, splitwise clone, split bills, track expenses, settle debts, group budget, expense calculator, serverless, supabase" />
    <meta name="robots" content="index, follow" />
    
    <!-- OpenGraph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://splitsync.vercel.app/" />
    <meta property="og:title" content="SplitSync - Track, Split & Settle Group Expenses" />
    <meta property="og:description" content="Settle bills with friends easily. Split equally, unequally, by percentage, or shares with real-time updates and chat." />
    <meta property="og:image" content="https://splitsync.vercel.app/og-image.jpg" />
    
    <!-- Twitter Cards -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="SplitSync - Track, Split & Settle Group Expenses" />
    <meta property="twitter:description" content="The easiest way to share bills and settle debts with friends." />
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <!-- Theme-Adaptive Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=7" />
  </head>
  <body class="text-slate-100 min-h-screen antialiased selection:bg-blue-500/30 selection:text-white">
    <script>
      (function() {
        const savedTheme = localStorage.getItem('split-sync-theme');
        if (savedTheme === 'light') {
          document.body.classList.add('theme-light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
